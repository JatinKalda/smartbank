name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Syntax check
        run: |
          node -c server-mysql.js
          node -c ai-chatbot.js
          node -c middleware/auth.js
          node -c services/audit-service.js
          node -c services/rate-limiter.js

      - name: Docker build
        run: docker build -t hsbc-bank-app .
