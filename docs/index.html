<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSBC Bank - Login & Signup</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chatbot-widget.css">
</head>
<body>
    <div class="container">
        <!-- Role Selector -->
        <div id="roleSelector" class="role-selector active">
            <div class="role-selector-card">
                <img src="images/hsbc.png" alt="HSBC Logo" class="role-logo">
                <h2>Welcome to HSBC Bank</h2>
                <p>Select your account type to continue</p>
                
                <div class="role-buttons">
                    <button class="role-btn admin-btn" id="selectAdmin">
                        <span class="role-icon">👑</span>
                        <span class="role-label">Admin Login</span>
                        <span class="role-desc">Bank Administrator</span>
                    </button>
                    
                    <button class="role-btn user-btn" id="selectUser">
                        <span class="role-icon">👤</span>
                        <span class="role-label">User Login</span>
                        <span class="role-desc">Customer Account</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Card Wrapper -->
        <div class="card-wrapper hidden">
            <div class="card-header">
                <img src="images/hsbc.png" alt="HSBC Logo" class="logo">
                <h1>HSBC Bank</h1>
                <button id="backBtn" class="back-btn" title="Back to role selection">← Back</button>
            </div>

            <!-- Form Container -->
            <div class="form-container">
                <!-- Toggle Buttons -->
                <div class="toggle-buttons">
                    <button class="toggle-btn active" id="loginBtn">Login</button>
                    <button class="toggle-btn" id="signupBtn">Sign Up</button>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="form active">
                    <h2>Login</h2>
                    <div class="form-group">
                        <label for="loginEmail">Email Address</label>
                        <input type="email" id="loginEmail" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" name="password" required>
                    </div>
                    <button type="submit" class="submit-btn">Login</button>
                    <p id="loginError" class="error-message"></p>
                    <p id="loginSuccess" class="success-message"></p>
                </form>

                <!-- Signup Form -->
                <form id="signupForm" class="form">
                    <h2>Sign Up</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" name="firstName" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" name="lastName" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="signupEmail">Email Address</label>
                        <input type="email" id="signupEmail" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" name="password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                    </div>
                    <button type="submit" class="submit-btn">Create Account</button>
                    <p id="signupError" class="error-message"></p>
                    <p id="signupSuccess" class="success-message"></p>
                </form>
            </div>
        </div>
    </div>

    <!-- Loading Animation -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="card-flip-animation">
            <div class="card-flip-inner">
                <div class="card-flip-front">
                    <img src="images/hsbc.png" alt="HSBC">
                </div>
                <div class="card-flip-back">
                    <p>Redirecting...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script src="js/chatbot-widget.js"></script>
</body>
</html>
